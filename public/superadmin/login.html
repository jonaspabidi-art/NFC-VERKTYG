<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ultra-admin - Logga in</title>
  <link rel="stylesheet" href="/shared/theme.css" />
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>Logga in <span class="accent">Ultra-admin</span></h1>
      <p class="muted">Endast för plattformens ägare.</p>

      <div class="field">
        <label for="password">Lösenord</label>
        <input type="password" id="password" autocomplete="current-password" />
      </div>

      <p id="login-error" class="error-text hidden"></p>

      <button id="login-btn" type="button">Logga in</button>
    </div>
  </div>

  <script src="/superadmin/superadmin.js"></script>
</body>
</html>
