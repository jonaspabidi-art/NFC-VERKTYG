<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Översikt</title>
  <link rel="stylesheet" href="/shared/theme.css" />
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>
  <div class="page wide">
    <div class="topbar">
      <h1>Översikt <span class="accent" id="restaurant-name"></span></h1>
      <span class="logout-link" id="logout-link">Logga ut</span>
    </div>

    <div class="card">
      <div class="stat-grid" id="stat-grid">
        <div class="stat-box">
          <div class="value" id="stat-total">-</div>
          <div class="label">Recensioner</div>
        </div>
        <div class="stat-box">
          <div class="value" id="stat-average">-</div>
          <div class="label">Snittbetyg</div>
        </div>
        <div class="stat-box">
          <div class="value" id="stat-clicks">-</div>
          <div class="label">Google-klick</div>
        </div>
        <div class="stat-box">
          <div class="value" id="stat-discounts">-</div>
          <div class="label">Rabattkoder använda</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>Betygsfördelning</h3>
      <div id="distribution"></div>
    </div>

    <div class="card">
      <h3>Inställningar</h3>
      <div class="field">
        <label for="setting-percent">Rabatt (%)</label>
        <input type="number" id="setting-percent" min="0" max="100" />
      </div>
      <div class="field">
        <label for="setting-valid-days">Giltighetstid (dagar)</label>
        <input type="number" id="setting-valid-days" min="1" max="365" />
      </div>
      <div class="field">
        <label for="setting-threshold">Betyg som räknas som "högt" (1-5)</label>
        <input type="number" id="setting-threshold" min="1" max="5" />
      </div>
      <div class="field">
        <label for="setting-owner-email">Larm-e-post (skickas vid 1-2 stjärnor, valfritt)</label>
        <input type="email" id="setting-owner-email" placeholder="agare@example.se" />
      </div>
      <div class="field">
        <label for="setting-logo-url">Logga-URL (visas på gästsidan, valfritt)</label>
        <input type="text" id="setting-logo-url" placeholder="https://..." />
      </div>
      <div class="field">
        <label for="setting-accent-color">Accentfärg på gästsidan (valfritt)</label>
        <input type="color" id="setting-accent-color" value="#d4af37" />
      </div>
      <button id="save-settings-btn">Spara inställningar</button>
      <p id="settings-message" class="muted hidden"></p>
    </div>

    <div class="card">
      <h3>Lös in rabattkod</h3>
      <div class="redeem-row">
        <input type="text" id="redeem-code" placeholder="t.ex. BELLA-7K2P9" />
        <button id="redeem-btn">Lös in</button>
      </div>
      <p id="redeem-message" class="muted hidden"></p>
    </div>

    <div class="card">
      <h3>Recensioner</h3>
      <table>
        <thead>
          <tr>
            <th>Datum</th>
            <th>Betyg</th>
            <th>Kommentar</th>
            <th>Google-klick</th>
            <th>Kontakt</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="reviews-body"></tbody>
      </table>
      <div class="pagination">
        <button id="prev-page" class="secondary">Föregående</button>
        <span class="muted" id="page-label"></span>
        <button id="next-page" class="secondary">Nästa</button>
      </div>
    </div>
  </div>

  <script src="/admin/admin.js"></script>
</body>
</html>
