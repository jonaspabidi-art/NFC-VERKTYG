<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Oversikt</title>
  <link rel="stylesheet" href="/shared/theme.css" />
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>
  <div class="page wide">
    <div class="topbar">
      <h1>Oversikt <span class="accent" id="restaurant-name"></span></h1>
      <span class="logout-link" id="logout-link">Logga ut</span>
    </div>

    <div class="card">
      <div class="stat-grid" id="stat-grid">
        <div class="stat-box">
          <div class="value" id="stat-total">-</div>
          <div class="label">Recensioner</div>
        </div>
        <div class="stat-box">
          <div class="value" id="stat-average">-</div>
          <div class="label">Snittbetyg</div>
        </div>
        <div class="stat-box">
          <div class="value" id="stat-clicks">-</div>
          <div class="label">Google-klick</div>
        </div>
        <div class="stat-box">
          <div class="value" id="stat-discounts">-</div>
          <div class="label">Rabattkoder anvanda</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>Betygsfordelning</h3>
      <div id="distribution"></div>
    </div>

    <div class="card">
      <h3>Los in rabattkod</h3>
      <div class="redeem-row">
        <input type="text" id="redeem-code" placeholder="t.ex. BELLA-7K2P9" />
        <button id="redeem-btn">Los in</button>
      </div>
      <p id="redeem-message" class="muted hidden"></p>
    </div>

    <div class="card">
      <h3>Recensioner</h3>
      <table>
        <thead>
          <tr>
            <th>Datum</th>
            <th>Betyg</th>
            <th>Kommentar</th>
            <th>Google-klick</th>
          </tr>
        </thead>
        <tbody id="reviews-body"></tbody>
      </table>
      <div class="pagination">
        <button id="prev-page" class="secondary">Foregaende</button>
        <span class="muted" id="page-label"></span>
        <button id="next-page" class="secondary">Nasta</button>
      </div>
    </div>
  </div>

  <script src="/admin/admin.js"></script>
</body>
</html>
