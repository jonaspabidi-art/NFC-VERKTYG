<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Logga in</title>
  <link rel="stylesheet" href="/shared/theme.css" />
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>Logga in <span class="accent">Adminvy</span></h1>
      <p class="muted">Ange din restaurangs slug och losenord.</p>

      <div class="field">
        <label for="slug">Restaurang (slug)</label>
        <input type="text" id="slug" placeholder="t.ex. pizzeria-bella" autocomplete="username" />
      </div>

      <div class="field">
        <label for="password">Losenord</label>
        <input type="password" id="password" autocomplete="current-password" />
      </div>

      <p id="login-error" class="error-text hidden"></p>

      <button id="login-btn" type="button">Logga in</button>
    </div>
  </div>

  <script src="/admin/admin.js"></script>
</body>
</html>
